# Supabase project configuration
# https://supabase.com/docs/reference/cli/config
project_id = "qklmedcvjacblxngsikl"

# mp-webhook receives unauthenticated POST requests from MercadoPago.
# Signature authenticity is verified via HMAC-SHA256 (MP_WEBHOOK_SECRET)
# inside the function itself — JWT verification is intentionally disabled.
[functions.mp-webhook]
verify_jwt = false

# whatsapp-webhook receives unauthenticated GET (verification) and POST (messages)
# requests from Meta. Verification uses WHATSAPP_VERIFY_TOKEN env var.
[functions.whatsapp-webhook]
verify_jwt = false

# whatsapp-reminders is called by a cron scheduler — no JWT available.
[functions.whatsapp-reminders]
verify_jwt = false
